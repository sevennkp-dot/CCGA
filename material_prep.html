<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังวัสดุฝ่ายผลิต | Material Preparation</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <style>
        :root {
            --bg-body: #050811;
            --bg-card: rgba(15, 23, 42, 0.85);
            --primary: #f59e0b;
            --primary-bright: #fbbf24;
            --primary-glow: rgba(245, 158, 11, 0.25);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.25);
            --blue: #3b82f6;
            --orange: #f97316;
            --purple: #a855f7;
            --red: #ef4444;
            --text: #ffffff;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(245, 158, 11, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(31, 41, 55, 1) 0%, var(--bg-body) 100%);
            z-index: -1;
            pointer-events: none;
        }

        .page-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* ── TOAST ── */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 280px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid var(--green);
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        .toast.info {
            border-left: 4px solid var(--blue);
        }

        .toast.warn {
            border-left: 4px solid var(--primary);
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            gap: 1.5rem;
            flex-wrap: wrap;
            background: rgba(15, 23, 42, 0.4);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 280px;
        }

        .header-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--green), #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 20px var(--green-glow);
            flex-shrink: 0;
        }

        .header-left h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #34d399, #6ee7b7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left p {
            color: var(--muted);
            font-size: 0.82rem;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .header-group {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* ── BUTTONS ── */
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-family: 'Kanit', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-outline {
            background: var(--bg-card);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary-bright);
        }

        .btn-dispatch {
            background: linear-gradient(135deg, var(--green), #059669);
            color: white;
            box-shadow: 0 4px 12px var(--green-glow);
            font-weight: 600;
        }

        .btn-dispatch:hover {
            transform: translateY(-1px);
        }

        .btn-dispatch:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-sm {
            padding: 0.35rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        /* ── KPI ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            transition: all 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            border-color: var(--card-color);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.5), 0 0 15px var(--card-glow);
        }

        .kpi-card.green {
            --card-color: #10b981;
            --card-glow: rgba(16, 185, 129, 0.2);
        }

        .kpi-card.yellow {
            --card-color: #f59e0b;
            --card-glow: rgba(245, 158, 11, 0.2);
        }

        .kpi-card.blue {
            --card-color: #3b82f6;
            --card-glow: rgba(59, 130, 246, 0.2);
        }

        .kpi-card.red {
            --card-color: #ef4444;
            --card-glow: rgba(239, 68, 68, 0.2);
        }

        .kpi-icon {
            font-size: 1.8rem;
        }

        .kpi-label {
            font-size: 0.82rem;
            color: var(--muted);
        }

        .kpi-value {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .kpi-card.green .kpi-value {
            color: #34d399;
        }

        .kpi-card.yellow .kpi-value {
            color: var(--primary-bright);
        }

        .kpi-card.blue .kpi-value {
            color: #60a5fa;
        }

        .kpi-card.red .kpi-value {
            color: #f87171;
        }

        /* ── TABS ── */
        .tab-nav {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            padding: 0.6rem 1.4rem;
            border-radius: 12px;
            font-family: 'Kanit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn:hover {
            border-color: var(--primary);
            color: var(--primary-bright);
        }

        .tab-btn.active-pending {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.5);
            color: #fbbf24;
        }

        .tab-btn.active-done {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.5);
            color: #34d399;
        }

        .tab-btn.active-damage {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.5);
            color: #f87171;
        }

        .tab-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 1px 8px;
            border-radius: 99px;
            font-size: 0.78rem;
        }

        /* ── ORDER GROUP CARD ── */
        .order-groups {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .order-group-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.25s;
        }

        .order-group-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 12px rgba(16, 185, 129, 0.1);
        }

        .order-group-card.dispatched-card {
            opacity: 0.75;
            border-color: rgba(16, 185, 129, 0.2);
        }

        .order-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .order-group-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .order-sku-badge {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.82rem;
            font-weight: 700;
            font-family: monospace;
        }

        .order-time {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .order-group-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── MATERIAL ITEMS ── */
        .material-list {
            padding: 0.75rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .material-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s;
        }

        .material-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .material-item-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .material-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .material-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .material-time {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 1px;
        }

        .material-qty {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qty-pill {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 4px 14px;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .qty-unit {
            color: var(--muted);
            font-size: 0.82rem;
        }

        /* ── DISPATCH STATUS ── */
        .dispatch-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .dispatch-badge.pending {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }

        .dispatch-badge.done {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        .dispatch-info {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }

        .empty-state .emoji {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #64748b;
        }

        .empty-state p {
            font-size: 0.88rem;
            color: #475569;
        }

        /* ── SPINNER ── */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── REALTIME DOT ── */
        .realtime-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 5px;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        .realtime-dot.off {
            background: #ef4444;
            animation: none;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 17, 0.85);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 92%;
            max-width: 460px;
            padding: 2rem;
            animation: modalSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        @keyframes modalSlide {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.2rem;
            color: #34d399;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.3rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-info-box {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.15);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.88rem;
            color: var(--muted);
        }

        .modal-info-box strong {
            color: #34d399;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.65rem 1rem;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: 'Kanit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .btn-cancel-modal {
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-cancel-modal:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* ── SECTION SEPARATOR ── */
        .section-note {
            font-size: 0.8rem;
            color: var(--muted);
            padding: 0.5rem 1.5rem 0.75rem;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
        }

        /* ── DAMAGE REPORT SECTION ── */
        .damage-section {
            display: none;
        }

        .damage-section.active {
            display: block;
        }

        .damage-filter-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        .damage-filter-bar input,
        .damage-filter-bar select {
            padding: 0.5rem 0.85rem;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Kanit', sans-serif;
            font-size: 0.88rem;
        }

        .damage-view-toggle {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 1.5rem;
            width: fit-content;
        }

        .dmg-toggle-tab {
            padding: 0.5rem 1.2rem;
            border-radius: 9px;
            font-family: 'Kanit', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--muted);
            border: 1px solid transparent;
            background: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dmg-toggle-tab:hover {
            color: var(--text);
        }

        .dmg-toggle-tab.active {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
        }

        .damage-table-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .damage-table-card .table-responsive {
            overflow-x: auto;
        }

        .damage-table-card table {
            width: 100%;
            border-collapse: collapse;
        }

        .damage-table-card thead tr {
            background: rgba(239, 68, 68, 0.08);
        }

        .damage-table-card th {
            padding: 0.9rem 1rem;
            text-align: left;
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
        }

        .damage-table-card td {
            padding: 0.85rem 1rem;
            font-size: 0.88rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }

        .damage-table-card tr:last-child td {
            border-bottom: none;
        }

        .damage-table-card tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge-damage {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .badge-status-dmg {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .badge-status-dmg.pending {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
        }

        .badge-status-dmg.delivered {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .btn-issue {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.35);
            color: #10b981;
            padding: 0.25rem 0.6rem;
            font-size: 0.75rem;
            border-radius: 6px;
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .btn-issue:hover {
            background: rgba(16, 185, 129, 0.35);
        }

        .qty-diff {
            font-weight: 600;
            color: #f87171;
        }

        .item-name-dmg {
            font-weight: 500;
            color: #e2e8f0;
        }

        .reason-text {
            color: var(--muted);
            font-size: 0.83rem;
        }

        .dmg-log-bar {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--muted);
            min-height: 2rem;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Dispatch Confirm Modal -->
    <div class="modal" id="dispatchModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✅ ยืนยันการจ่ายวัสดุ</h2>
                <button class="modal-close" onclick="closeDispatchModal()">✕</button>
            </div>
            <div class="modal-info-box" id="modalOrderInfo">
                <!-- filled by JS -->
            </div>
            <div class="form-group">
                <label>👤 ชื่อผู้จ่ายวัสดุ <span style="color:#ef4444;">*</span></label>
                <input type="text" id="dispatcherName" placeholder="ระบุชื่อผู้จ่ายวัสดุ..." autocomplete="off">
            </div>
            <div class="form-group">
                <label>🏭 ชื่อฝ่ายผลิต (ผู้รับวัสดุ) <span style="color:#ef4444;">*</span></label>
                <input type="text" id="productionTeamName" placeholder="ระบุชื่อฝ่ายผลิตที่รับวัสดุ..." autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel-modal" onclick="closeDispatchModal()">ยกเลิก</button>
                <button class="btn btn-dispatch" id="confirmDispatchBtn" onclick="confirmDispatch()">
                    ✅ ยืนยันจ่ายวัสดุ
                </button>
            </div>
        </div>
    </div>

    <!-- Damage Issue Confirm Modal -->
    <div class="modal" id="dmgIssueModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✅ ยืนยันการจ่ายวัสดุทดแทน</h2>
                <button class="modal-close" onclick="closeDmgIssueModal()">✕</button>
            </div>
            <div class="modal-info-box" id="dmgIssueModalInfo">
                <!-- filled by JS -->
            </div>
            <div class="form-group">
                <label>👤 ชื่อผู้จ่ายวัสดุ <span style="color:#ef4444;">*</span></label>
                <input type="text" id="dmgIssuerName" placeholder="ระบุชื่อผู้จ่ายวัสดุทดแทน..." autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel-modal" onclick="closeDmgIssueModal()">ยกเลิก</button>
                <button class="btn btn-dispatch" id="confirmDmgIssueBtn" onclick="confirmDmgIssue()">
                    ✅ ยืนยันจ่ายของแล้ว
                </button>
            </div>
        </div>
    </div>

    <div class="page-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="header-icon">📋</div>
                <div>
                    <h1>คลังวัสดุ</h1>
                    <p>
                        <span class="realtime-dot" id="realtimeDot"></span>
                        รายการวัสดุที่ระบบหักอัตโนมัติ — รอจ่ายให้ฝ่ายผลิต
                    </p>
                </div>
            </div>
            <div class="header-right">
                <div class="header-group">
                    <a href="production.html" data-allowed-roles="Ceo, pdtPerson" class="btn btn-outline">← ฝ่ายผลิต</a>
                    <a href="stock_management.html" class="btn btn-outline"
                        data-allowed-roles="Ceo, APRD"
                        style="border-color:rgba(245,158,11,0.3); color:#fbbf24;">📦 สต็อก</a>
                    <button class="btn btn-outline" onclick="loadData()">🔄 รีเฟรช</button>
                </div>
                <div class="header-group">
                    <div id="user-display-area"></div>
                    <button onclick="auth.logout()"
                        style="padding:0.45rem 1rem; background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.2); color:#f87171; border-radius:9px; cursor:pointer; font-family:'Kanit'; font-size:0.8rem; transition:all 0.2s; font-weight:500; display:flex; align-items:center; gap:4px;"
                        onmouseover="this.style.background='rgba(248,113,113,0.15)'"
                        onmouseout="this.style.background='rgba(248,113,113,0.08)'">
                        🚪 ออกจากระบบ
                    </button>
                </div>
            </div>
        </header>

        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card yellow">
                <div class="kpi-icon">⏳</div>
                <div class="kpi-label">ออเดอร์รอจัดเตรียม</div>
                <div class="kpi-value" id="kpiPending">-</div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-icon">✅</div>
                <div class="kpi-label">จ่ายแล้ววันนี้</div>
                <div class="kpi-value" id="kpiToday">-</div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-icon">📦</div>
                <div class="kpi-label">รายการวัสดุรอจัดเตรียม</div>
                <div class="kpi-value" id="kpiItems">-</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-nav">
            <button class="tab-btn active-pending" id="tabPending" onclick="switchTab('pending')">
                ⏳ รอจัดเตรียม <span class="tab-count" id="countPending">0</span>
            </button>
            <button class="tab-btn" id="tabDone" onclick="switchTab('done')">
                ✅ จ่ายแล้ว <span class="tab-count" id="countDone">0</span>
            </button>
            <button class="tab-btn" id="tabDamage" onclick="switchTab('damage')">
                ⚠️ วัสดุเสียหาย <span class="tab-count" id="countDamage">0</span>
            </button>
        </div>

        <!-- Content: เตรียมวัสดุ -->
        <div id="mainContent">
            <div class="empty-state">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Content: วัสดุเสียหาย -->
        <div id="damageSection" class="damage-section">
            <!-- KPI Damage -->
            <div class="kpi-grid" style="margin-bottom:1.5rem;">
                <div class="kpi-card red">
                    <div class="kpi-icon">⚠️</div>
                    <div class="kpi-label">รายการทั้งหมด</div>
                    <div class="kpi-value" id="dmgKpiTotal">—</div>
                </div>
                <div class="kpi-card red">
                    <div class="kpi-icon">📉</div>
                    <div class="kpi-label">รวมจำนวนที่เสียหาย</div>
                    <div class="kpi-value" id="dmgKpiQty">—</div>
                </div>
                <div class="kpi-card yellow">
                    <div class="kpi-icon">📅</div>
                    <div class="kpi-label">วันนี้</div>
                    <div class="kpi-value" id="dmgKpiToday">—</div>
                </div>
            </div>

            <!-- Damage Filters -->
            <div class="damage-filter-bar">
                <input type="date" id="dmgFilterDateFrom" placeholder="วันที่เริ่ม">
                <input type="date" id="dmgFilterDateTo" placeholder="วันที่สิ้นสุด">
                <input type="text" id="dmgFilterItem" placeholder="🔍 ค้นหาชื่อวัสดุ..." style="min-width:200px;">
                <button class="btn btn-outline" onclick="dmgLoadData()">🔄 รีเฟรช</button>
            </div>

            <!-- View Toggle -->
            <div class="damage-view-toggle">
                <button id="dmgTabSummary" class="dmg-toggle-tab active" onclick="dmgSwitchView('summary')">📊
                    สรุปยอดตามวัสดุ</button>
                <button id="dmgTabDetails" class="dmg-toggle-tab" onclick="dmgSwitchView('details')">📜
                    ประวัติแบบละเอียด</button>
            </div>

            <!-- Damage Table -->
            <div class="damage-table-card">
                <div class="table-responsive">
                    <table>
                        <thead id="dmgTableHeader"></thead>
                        <tbody id="dmgTableBody">
                            <tr>
                                <td style="text-align:center;padding:2rem;">
                                    <div class="empty-state">
                                        <div class="emoji">⏳</div>
                                        <p>กำลังโหลด...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="dmg-log-bar" id="dmgLogBar">พร้อมใช้งาน</div>
        </div>
    </div>

    <script>
        // ─── CONFIG ─────────────────────────────────────────────────────────
        let db = null;
        let allLogs = [];
        let pendingGroups = {};
        let doneGroups = {};
        let activeTab = 'pending';
        let pendingDispatchData = null; // {orderKey, logIds, orderSku}
        let orderNamesMap = {}; // mapping of orderId -> product_name
        let realtimeChannel = null;
        let dmgRealtimeChannel = null;

        const DEDUCT_PREFIX = 'ตัดสต็อกอัตโนมัติ (เริ่มผลิต)';

        // ─── DAMAGE REPORT STATE ────────────────────────────────────────────
        let dmgAllLogs = [];
        let dmgCurrentView = 'summary';
        let dmgLoaded = false;

        // ─── INIT ────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            db = (window.auth && window.auth.supabase)
                ? window.auth.supabase
                : (window.supabase && window.SUPABASE_CONFIG
                    ? window.supabase.createClient(window.SUPABASE_CONFIG.URL, window.SUPABASE_CONFIG.KEY)
                    : null);

            if (!db) {
                showToast('❌ ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
                return;
            }

            await loadData();
            startRealtime();
            // Load damage badge count in background (no need to wait)
            dmgLoadBadgeCount();
        });

        // ─── REALTIME ────────────────────────────────────────────────────────
        function startRealtime() {
            if (!db) return;
            realtimeChannel = db
                .channel('material-prep-realtime')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'stock_movement_log'
                }, () => {
                    loadData();
                })
                .subscribe(status => {
                    const dot = document.getElementById('realtimeDot');
                    if (status === 'SUBSCRIBED') {
                        if (dot) dot.classList.remove('off');
                    } else {
                        if (dot) dot.classList.add('off');
                    }
                });
        }

        window.addEventListener('beforeunload', () => {
            if (realtimeChannel && db) db.removeChannel(realtimeChannel);
        });

        // ─── FETCH ORDER PRODUCT NAMES ───────────────────────────────────────
        async function fetchOrderProductNames() {
            orderNamesMap = {};
            const orderIds = [];
            allLogs.forEach(log => {
                const idMatch = log.reason ? log.reason.match(/ID ออเดอร์:\s*([^\s]+)/) : null;
                const orderId = idMatch ? idMatch[1].trim() : null;
                if (orderId && !orderIds.includes(orderId)) {
                    orderIds.push(orderId);
                }
            });

            if (orderIds.length === 0) return;

            try {
                const { data, error } = await db
                    .from('stock_orders')
                    .select('id, product_name')
                    .in('id', orderIds);
                if (error) {
                    console.error('Error fetching order names:', error);
                    return;
                }
                if (data) {
                    data.forEach(o => {
                        orderNamesMap[o.id] = o.product_name;
                    });
                }
            } catch (err) {
                console.error('fetchOrderProductNames exception:', err);
            }
        }

        // ─── LOAD DATA ───────────────────────────────────────────────────────
        async function loadData() {
            try {
                const { data, error } = await db
                    .from('stock_movement_log')
                    .select('*')
                    .like('reason', `${DEDUCT_PREFIX}%`)
                    .order('created_at', { ascending: false })
                    .limit(1000);

                if (error) throw error;
                allLogs = data || [];
                await fetchOrderProductNames();
                processData();
                renderContent();
                updateKPIs();
            } catch (err) {
                showToast('❌ โหลดข้อมูลล้มเหลว: ' + err.message, 'error');
            }
        }

        // ─── PROCESS: GROUP BY ORDER ─────────────────────────────────────────
        function processData() {
            pendingGroups = {};
            doneGroups = {};

            allLogs.forEach(log => {
                // Extract order ID, SKU, and Order Number from reason string
                // New Format: "ตัดสต็อกอัตโนมัติ (เริ่มผลิต) ID ออเดอร์: XXXXX เลขที่ออเดอร์: YYYYY SKUออเดอร์: ZZZZZ"
                // Old Format: "ตัดสต็อกอัตโนมัติ (เริ่มผลิต) SKU ออเดอร์: XXXXX"
                const idMatch = log.reason ? log.reason.match(/ID ออเดอร์:\s*([^\s]+)/) : null;
                const orderId = idMatch ? idMatch[1].trim() : null;

                const orderNoMatch = log.reason ? log.reason.match(/เลขที่ออเดอร์:\s*([^\s]+)/) : null;
                const orderNo = orderNoMatch ? orderNoMatch[1].trim() : null;

                const skuMatch = log.reason ? log.reason.match(/(?:SKUออเดอร์:|SKU ออเดอร์:)\s*(.+)$/) : null;
                const orderSku = skuMatch ? skuMatch[1].trim() : 'ไม่ระบุ';

                // Group key: if orderId exists, use it. Otherwise, fallback to old date + SKU grouping.
                let groupKey;
                if (orderId) {
                    groupKey = orderId;
                } else {
                    const dateKey = log.created_at ? new Date(log.created_at).toISOString().substring(0, 16) : 'unknown';
                    groupKey = `${orderSku}__${dateKey}`;
                }

                const target = (log.dispatched === true) ? doneGroups : pendingGroups;

                if (!target[groupKey]) {
                    target[groupKey] = {
                        key: groupKey,
                        orderSku,
                        orderNo,
                        productName: orderId ? (orderNamesMap[orderId] || null) : null,
                        createdAt: log.created_at,
                        items: [],
                        // dispatch info (from first dispatched item)
                        dispatchedBy: log.dispatched_by || null,
                        dispatchedAt: log.dispatched_at || null,
                    };
                }

                target[groupKey].items.push(log);
                // Update dispatch info if available
                if (log.dispatched_by) {
                    target[groupKey].dispatchedBy = log.dispatched_by;
                    target[groupKey].dispatchedAt = log.dispatched_at;
                }
            });
        }

        // ─── RENDER ──────────────────────────────────────────────────────────
        function renderContent() {
            const groups = activeTab === 'pending' ? pendingGroups : doneGroups;
            const entries = Object.values(groups);
            const container = document.getElementById('mainContent');

            if (entries.length === 0) {
                if (activeTab === 'pending') {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">✅</div>
                            <h3>ไม่มีรายการรอจัดเตรียม</h3>
                            <p>เมื่อมีการกด "เริ่มผลิต" ระบบจะแสดงรายการวัสดุที่ต้องเตรียมที่นี่</p>
                        </div>`;
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">📋</div>
                            <h3>ยังไม่มีประวัติการจ่ายวัสดุ</h3>
                            <p>ประวัติการจ่ายวัสดุจะแสดงที่นี่หลังจากกด "จ่ายวัสดุแล้ว"</p>
                        </div>`;
                }
                return;
            }

            const html = entries.map(group => renderGroupCard(group)).join('');
            container.innerHTML = `<div class="order-groups">${html}</div>`;
        }

        function renderGroupCard(group) {
            const isDone = activeTab === 'done';
            const dateStr = group.createdAt
                ? new Date(group.createdAt).toLocaleString('th-TH', { hour12: false, hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })
                : '-';

            const dispatchBtn = !isDone
                ? `<button class="btn btn-dispatch btn-sm" 
                        onclick="openDispatchModal('${escHtml(group.key)}', '${escHtml(group.orderSku)}')">
                        ✅ จ่ายวัสดุแล้ว
                   </button>`
                : `<div style="text-align:right;">
                       <div class="dispatch-badge done">✅ จ่ายแล้ว</div>
                       <div class="dispatch-info">
                           👤 ${escHtml(group.dispatchedBy || '-')}<br>
                           🕐 ${group.dispatchedAt ? new Date(group.dispatchedAt).toLocaleString('th-TH', { hour12: false }) : '-'}
                       </div>
                   </div>`;

            const itemsHtml = group.items.map(log => {
                const qty = Math.abs(log.delta ?? (log.old_qty - log.new_qty) ?? 0) || '?';
                const icons = getCategoryIcon(log.item_name);
                return `
                    <div class="material-item">
                        <div class="material-item-left">
                            <div class="material-icon">${icons}</div>
                            <div>
                                <div class="material-name">${escHtml(log.item_name || '-')}</div>
                                <div class="material-time">${log.created_at ? new Date(log.created_at).toLocaleString('th-TH', { hour12: false }) : '-'}</div>
                            </div>
                        </div>
                        <div class="material-qty">
                            <span class="qty-pill">-${qty}</span>
                            <span class="qty-unit">ชิ้น</span>
                        </div>
                    </div>`;
            }).join('');

            const titleText = group.orderNo ? `เลขที่ออเดอร์: ${escHtml(group.orderNo)}` : 'ออเดอร์ผลิต';

            return `
                <div class="order-group-card ${isDone ? 'dispatched-card' : ''}">
                    <div class="order-group-header">
                        <div class="order-group-title">
                            <span class="order-sku-badge"># ${escHtml(group.orderSku)}</span>
                            <div>
                                <div style="font-weight:600; font-size:0.95rem;">${titleText}</div>
                                ${group.productName ? `<div style="font-size:0.82rem; color:#e2e8f0; font-weight:500; margin-top:2px;">📦 ${escHtml(group.productName)}</div>` : ''}
                                <div class="order-time">🕐 เริ่มผลิต: ${dateStr} • ${group.items.length} รายการวัสดุ</div>
                            </div>
                        </div>
                        <div class="order-group-actions">
                            ${dispatchBtn}
                        </div>
                    </div>
                    <div class="material-list">${itemsHtml}</div>
                    ${!isDone ? `<div class="section-note">📌 กรุณาเตรียมวัสดุตามรายการข้างต้น แล้วกด "จ่ายวัสดุแล้ว" เมื่อเตรียมเสร็จ</div>` : ''}
                </div>`;
        }

        // ─── KPI UPDATE ──────────────────────────────────────────────────────
        function updateKPIs() {
            const pendingCount = Object.keys(pendingGroups).length;
            const pendingItems = Object.values(pendingGroups).reduce((sum, g) => sum + g.items.length, 0);

            // Today's dispatched groups
            const today = new Date().toDateString();
            const todayCount = Object.values(doneGroups).filter(g =>
                g.dispatchedAt && new Date(g.dispatchedAt).toDateString() === today
            ).length;

            document.getElementById('kpiPending').textContent = pendingCount;
            document.getElementById('kpiToday').textContent = todayCount;
            document.getElementById('kpiItems').textContent = pendingItems;

            document.getElementById('countPending').textContent = pendingCount;
            document.getElementById('countDone').textContent = Object.keys(doneGroups).length;
        }

        // ─── TAB SWITCHING ───────────────────────────────────────────────────
        function switchTab(tab) {
            activeTab = tab;

            document.getElementById('tabPending').className = 'tab-btn' + (tab === 'pending' ? ' active-pending' : '');
            document.getElementById('tabDone').className = 'tab-btn' + (tab === 'done' ? ' active-done' : '');
            document.getElementById('tabDamage').className = 'tab-btn' + (tab === 'damage' ? ' active-damage' : '');

            const mainContent = document.getElementById('mainContent');
            const damageSection = document.getElementById('damageSection');

            if (tab === 'damage') {
                mainContent.style.display = 'none';
                damageSection.classList.add('active');
                // Load damage data on first visit
                if (!dmgLoaded) {
                    dmgLoadData();
                    dmgLoaded = true;
                }
            } else {
                mainContent.style.display = '';
                damageSection.classList.remove('active');
                renderContent();
            }
        }

        // ─── DISPATCH MODAL ──────────────────────────────────────────────────
        function openDispatchModal(groupKey, orderSku) {
            const group = pendingGroups[groupKey];
            if (!group) return;

            pendingDispatchData = {
                groupKey,
                orderSku,
                logIds: group.items.map(i => i.id)
            };

            const displayTitleText = group.orderNo ? `เลขที่ออเดอร์: ${group.orderNo}` : `SKU ออเดอร์: ${orderSku}`;

            document.getElementById('modalOrderInfo').innerHTML = `
                <div style="margin-bottom:0.5rem;">
                    <span style="color:var(--muted); font-size:0.8rem;">รายการจัดเตรียม</span><br>
                    <strong># ${escHtml(displayTitleText)}</strong>
                </div>
                <div style="color:var(--muted); font-size:0.82rem;">
                    วัสดุที่จะยืนยันว่าจ่ายแล้ว: <strong style="color:#fbbf24;">${group.items.length} รายการ</strong>
                </div>
                <div style="margin-top:0.5rem; font-size:0.8rem; color:#64748b;">
                    ${group.items.map(i => `• ${i.item_name} (${Math.abs(i.delta ?? 0)} ชิ้น)`).join('<br>')}
                </div>`;

            document.getElementById('dispatcherName').value = '';
            document.getElementById('productionTeamName').value = '';
            document.getElementById('dispatcherName').style.borderColor = '';
            document.getElementById('productionTeamName').style.borderColor = '';
            document.getElementById('dispatchModal').classList.add('active');
            setTimeout(() => document.getElementById('dispatcherName').focus(), 100);
        }

        function closeDispatchModal() {
            document.getElementById('dispatchModal').classList.remove('active');
            pendingDispatchData = null;
        }

        // Close modal on backdrop click
        document.getElementById('dispatchModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('dispatchModal')) closeDispatchModal();
        });

        async function confirmDispatch() {
            if (!pendingDispatchData) return;

            const name = document.getElementById('dispatcherName').value.trim();
            const productionTeam = document.getElementById('productionTeamName').value.trim();

            let hasError = false;
            if (!name) {
                document.getElementById('dispatcherName').style.borderColor = '#ef4444';
                document.getElementById('dispatcherName').focus();
                showToast('⚠️ กรุณาระบุชื่อผู้จ่ายวัสดุ', 'warn');
                hasError = true;
            } else {
                document.getElementById('dispatcherName').style.borderColor = '';
            }
            if (!productionTeam) {
                document.getElementById('productionTeamName').style.borderColor = '#ef4444';
                if (!hasError) document.getElementById('productionTeamName').focus();
                showToast('⚠️ กรุณาระบุชื่อฝ่ายผลิต (ผู้รับวัสดุ)', 'warn');
                hasError = true;
            } else {
                document.getElementById('productionTeamName').style.borderColor = '';
            }
            if (hasError) return;

            const btn = document.getElementById('confirmDispatchBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> กำลังบันทึก...';

            try {
                const now = new Date().toISOString();
                const { error } = await db
                    .from('stock_movement_log')
                    .update({
                        dispatched: true,
                        dispatched_by: name,
                        dispatched_at: now,
                        operator: productionTeam
                    })
                    .in('id', pendingDispatchData.logIds);

                if (error) throw error;

                showToast(`✅ บันทึกการจ่ายวัสดุสำเร็จ — ฝ่ายผลิต: ${productionTeam} จ่ายโดย: ${name}`, 'success');
                closeDispatchModal();
                await loadData();
            } catch (err) {
                showToast('❌ บันทึกล้มเหลว: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✅ ยืนยันจ่ายวัสดุ';
            }
        }

        // ─── HELPERS ─────────────────────────────────────────────────────────
        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function getCategoryIcon(name) {
            if (!name) return '📦';
            const n = name.toLowerCase();
            if (n.includes('กระจก') || n.includes('glass')) return '🪟';
            if (n.includes('อลูมิเนียม') || n.includes('aluminum') || n.includes('aluminium')) return '📐';
            if (n.includes('มุ้ง') || n.includes('screen')) return '🕸️';
            if (n.includes('ยาง') || n.includes('rubber')) return '⭕';
            if (n.includes('สกรู') || n.includes('screw') || n.includes('น็อต')) return '🔩';
            return '📦';
        }

        // ─── TOAST ───────────────────────────────────────────────────────────
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ─── DAMAGE BADGE (lightweight, runs on init) ─────────────────────────
        async function dmgLoadBadgeCount() {
            if (!db) return;
            try {
                const { data, error } = await db
                    .from('damaged_materials')
                    .select('id')
                    .eq('status', 'pending');
                if (error) return;
                document.getElementById('countDamage').textContent = (data || []).length;
            } catch (_) {}
        }

        // ════════════════════════════════════════════════════════════════════
        // ─── DAMAGE REPORT LOGIC ─────────────────────────────────────────
        // ════════════════════════════════════════════════════════════════════

        function dmgLog(msg) {
            const el = document.getElementById('dmgLogBar');
            if (el) el.textContent = `[${new Date().toLocaleTimeString('th-TH')}] ${msg}`;
        }

        function dmgEsc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function dmgSwitchView(view) {
            dmgCurrentView = view;
            document.getElementById('dmgTabSummary').classList.toggle('active', view === 'summary');
            document.getElementById('dmgTabDetails').classList.toggle('active', view === 'details');
            dmgRenderTable();
        }

        async function dmgLoadData() {
            dmgLog('กำลังโหลดข้อมูล...');
            document.getElementById('dmgTableBody').innerHTML =
                `<tr><td colspan="6"><div class="empty-state"><div class="emoji">⏳</div><p>กำลังโหลด...</p></div></td></tr>`;

            try {
                const { data, error } = await db
                    .from('damaged_materials')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(500);
                if (error) throw error;

                dmgAllLogs = data || [];
                dmgRenderTable();

                // Update damage count badge — show only pending items
                const pendingCount = dmgAllLogs.filter(r => r.status === 'pending').length;
                document.getElementById('countDamage').textContent = pendingCount;

                dmgLog(`โหลดสำเร็จ ${dmgAllLogs.length} รายการ`);
                if (!dmgRealtimeChannel) dmgStartRealtime();
            } catch (err) {
                dmgLog(`โหลดล้มเหลว: ${err.message}`);
                document.getElementById('dmgTableBody').innerHTML =
                    `<tr><td colspan="6" style="text-align:center;color:#f87171;padding:2rem;">❌ ${err.message}</td></tr>`;
            }
        }

        function dmgGetFiltered() {
            const dateFrom = document.getElementById('dmgFilterDateFrom').value;
            const dateTo = document.getElementById('dmgFilterDateTo').value;
            const searchItem = document.getElementById('dmgFilterItem').value.trim().toLowerCase();

            return dmgAllLogs.filter(r => {
                const created = r.created_at ? r.created_at.substring(0, 10) : '';
                if (dateFrom && created < dateFrom) return false;
                if (dateTo && created > dateTo) return false;
                if (searchItem && !String(r.item_name || '').toLowerCase().includes(searchItem)) return false;
                return true;
            });
        }

        function dmgRenderTable() {
            const rows = dmgGetFiltered();
            const thead = document.getElementById('dmgTableHeader');
            const tbody = document.getElementById('dmgTableBody');

            // Update KPIs
            document.getElementById('dmgKpiTotal').textContent = rows.length;
            const totalDmg = rows.reduce((s, r) => s + (r.quantity || 0), 0);
            document.getElementById('dmgKpiQty').textContent = totalDmg.toLocaleString('th-TH');
            const today = new Date().toISOString().substring(0, 10);
            const todayCount = rows.filter(r => (r.created_at || '').startsWith(today)).length;
            document.getElementById('dmgKpiToday').textContent = todayCount;

            if (!rows.length) {
                thead.innerHTML = '';
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="emoji">✅</div><p>ไม่มีรายการข้อมูลชำรุด</p></div></td></tr>`;
                return;
            }

            if (dmgCurrentView === 'summary') {
                thead.innerHTML = `
                    <tr>
                        <th style="width:50px;">#</th>
                        <th>ชื่อวัสดุที่ชำรุด</th>
                        <th>รวมเสียหายสะสม (ชิ้น)</th>
                        <th>ค้างส่งมอบ (ชิ้น)</th>
                        <th>ความถี่ที่ชำรุด (ครั้ง)</th>
                        <th>เสียหายล่าสุดเมื่อ</th>
                    </tr>`;

                const grouped = {};
                rows.forEach(r => {
                    const name = r.item_name || 'ไม่ระบุชื่อ';
                    if (!grouped[name]) {
                        grouped[name] = { item_name: name, total_qty: 0, count: 0, pending_qty: 0, latest_date: r.created_at };
                    }
                    grouped[name].total_qty += (r.quantity || 0);
                    grouped[name].count += 1;
                    if (r.status === 'pending') grouped[name].pending_qty += (r.quantity || 0);
                    if (new Date(r.created_at) > new Date(grouped[name].latest_date)) {
                        grouped[name].latest_date = r.created_at;
                    }
                });

                const aggregatedList = Object.values(grouped).sort((a, b) => b.total_qty - a.total_qty);

                tbody.innerHTML = aggregatedList.map((item, i) => {
                    const d = new Date(item.latest_date);
                    const dateStr = d.toLocaleDateString('th-TH');
                    const timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    const pendingText = item.pending_qty > 0
                        ? `<span style="color:#f59e0b;font-weight:600;background:rgba(245,158,11,0.1);padding:2px 8px;border-radius:12px;">⏳ ค้าง ${item.pending_qty} ชิ้น</span>`
                        : `<span style="color:var(--muted);">0</span>`;
                    return `<tr>
                        <td style="color:var(--muted);">${i + 1}</td>
                        <td><span class="item-name-dmg">${dmgEsc(item.item_name)}</span></td>
                        <td><span class="qty-diff" style="font-size:1rem;">-${item.total_qty}</span></td>
                        <td>${pendingText}</td>
                        <td style="color:#e2e8f0;font-weight:500;">${item.count} ครั้ง</td>
                        <td style="white-space:nowrap;">
                            <div style="font-size:0.88rem;">${dateStr}</div>
                            <div style="font-size:0.75rem;color:var(--muted);">${timeStr}</div>
                        </td>
                    </tr>`;
                }).join('');

            } else {
                thead.innerHTML = `
                    <tr>
                        <th style="width:50px;">#</th>
                        <th>วันที่/เวลา</th>
                        <th>เลขออเดอร์</th>
                        <th>ชื่อวัสดุ</th>
                        <th>จำนวน</th>
                        <th>เหตุผล</th>
                        <th>ผู้จ่าย</th>
                        <th>สถานะการจัดส่ง</th>
                    </tr>`;

                tbody.innerHTML = rows.map((r, i) => {
                    const d = new Date(r.created_at);
                    const dateStr = d.toLocaleDateString('th-TH');
                    const timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                    let statusHtml = '';
                    if (r.status === 'pending') {
                        statusHtml = `<span class="badge-status-dmg pending">⏳ รอจ่ายของ</span>
                                     <button class="btn-issue" onclick="dmgConfirmIssue('${r.id}')">✔️ จ่ายของแล้ว</button>`;
                    } else {
                        statusHtml = `<span class="badge-status-dmg delivered">✅ จ่ายแล้ว</span>`;
                    }
                    return `<tr>
                        <td style="color:var(--muted);">${i + 1}</td>
                        <td style="white-space:nowrap;">
                            <div style="font-size:0.88rem;">${dateStr}</div>
                            <div style="font-size:0.75rem;color:var(--muted);">${timeStr}</div>
                        </td>
                        <td><span style="font-family:monospace;color:var(--muted);font-size:0.88rem;">${dmgEsc(r.order_number || '-')}</span></td>
                        <td><span class="item-name-dmg">${dmgEsc(r.item_name)}</span></td>
                        <td><span class="qty-diff">-${r.quantity}</span></td>
                        <td><span class="badge-damage">${dmgEsc(r.reason || 'เสียหาย')}</span></td>
                        <td>${r.delivered_by
                            ? `<span style="color:#10b981; font-weight:500;">👤 ${dmgEsc(r.delivered_by)}</span>`
                            : `<span style="color:var(--muted);">—</span>`
                        }</td>
                        <td>${statusHtml}</td>
                    </tr>`;
                }).join('');
            }
        }

        let pendingDmgIssueId = null;

        function dmgConfirmIssue(id) {
            const row = dmgAllLogs.find(r => String(r.id) === String(id));
            pendingDmgIssueId = id;

            document.getElementById('dmgIssueModalInfo').innerHTML = row
                ? `<div style="margin-bottom:0.5rem;">
                       <span style="color:var(--muted); font-size:0.8rem;">วัสดุที่จะยืนยันว่าจ่ายแล้ว</span><br>
                       <strong style="color:#34d399;">${dmgEsc(row.item_name || '-')}</strong>
                   </div>
                   <div style="color:var(--muted); font-size:0.82rem;">
                       จำนวน: <strong style="color:#f87171;">-${row.quantity || 0} ชิ้น</strong>
                       ${row.order_number ? ` &nbsp;•&nbsp; เลขออเดอร์: <strong style="color:#fbbf24;">${dmgEsc(row.order_number)}</strong>` : ''}
                   </div>`
                : '<div>ยืนยันการจ่ายวัสดุทดแทน</div>';

            document.getElementById('dmgIssuerName').value = '';
            document.getElementById('dmgIssueModal').classList.add('active');
            setTimeout(() => document.getElementById('dmgIssuerName').focus(), 100);
        }

        function closeDmgIssueModal() {
            document.getElementById('dmgIssueModal').classList.remove('active');
            pendingDmgIssueId = null;
        }

        document.getElementById('dmgIssueModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('dmgIssueModal')) closeDmgIssueModal();
        });

        async function confirmDmgIssue() {
            if (!pendingDmgIssueId) return;

            const name = document.getElementById('dmgIssuerName').value.trim();
            if (!name) {
                document.getElementById('dmgIssuerName').style.borderColor = '#ef4444';
                document.getElementById('dmgIssuerName').focus();
                showToast('⚠️ กรุณาระบุชื่อผู้จ่ายวัสดุ', 'warn');
                return;
            }

            const btn = document.getElementById('confirmDmgIssueBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;"></span> กำลังบันทึก...';

            try {
                const now = new Date().toISOString();
                const { error } = await db
                    .from('damaged_materials')
                    .update({ status: 'delivered', delivered_by: name })
                    .eq('id', pendingDmgIssueId);
                if (error) throw error;

                // Sync with stock_movement_log
                const { error: logErr } = await db
                    .from('stock_movement_log')
                    .update({
                        dispatched: true,
                        dispatched_by: name,
                        dispatched_at: now
                    })
                    .like('reason', `%[Ref: ${pendingDmgIssueId}]%`);
                if (logErr) console.warn('Failed to sync stock_movement_log:', logErr);

                dmgLog(`✅ ยืนยันจ่ายของทดแทนเรียบร้อย — โดย ${name}`);
                showToast(`✅ บันทึกสำเร็จ — จ่ายโดย ${name}`, 'success');
                closeDmgIssueModal();
                await dmgLoadData();
            } catch (err) {
                dmgLog(`❌ ไม่สามารถยืนยันได้: ${err.message}`);
                showToast(`❌ เกิดข้อผิดพลาด: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✅ ยืนยันจ่ายของแล้ว';
            }
        }

        function dmgStartRealtime() {
            if (!db) return;
            dmgRealtimeChannel = db
                .channel('damage-report-merged-realtime')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'damaged_materials'
                }, () => {
                    dmgLog('🔴 อัปเดตเรียลไทม์ — กำลังโหลดใหม่...');
                    dmgLoadData();
                })
                .subscribe(status => {
                    if (status === 'SUBSCRIBED') {
                        dmgLog('🟢 เชื่อมต่อเรียลไทม์สำเร็จ');
                    }
                });
        }

        // Auto-filter on input change for damage filters
        ['dmgFilterDateFrom', 'dmgFilterDateTo', 'dmgFilterItem'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', dmgRenderTable);
        });

        window.addEventListener('beforeunload', () => {
            if (dmgRealtimeChannel && db) db.removeChannel(dmgRealtimeChannel);
        });
    </script>
</body>

</html>
